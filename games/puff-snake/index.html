<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Puff Snake</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #F0F4C3;
            /* Lime Light */
            touch-action: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>
    <div id="ui-layer"
        style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center;">

        <!-- Skin Selector -->
        <button id="skinBtn"
            style="position: absolute; top: 10px; right: 10px; pointer-events: auto; background: rgba(255,255,255,0.9); border: 2px solid #AED581; border-radius: 15px; padding: 8px 15px; font-size: 14px; cursor: pointer; font-weight: bold; color: #689F38;">
            🎨 Skin
        </button>

        <!-- Game Over Panel -->
        <div id="gameOverPanel"
            style="display: none; background: rgba(255, 255, 255, 0.95); padding: 2rem; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); pointer-events: auto; border: 2px solid #AED581;">
            <h1 style="color: #689F38; margin: 0 0 10px 0; font-size: 2.5rem;">Ouch!</h1>
            <p id="finalScore" style="font-size: 1.5rem; color: #555; margin: 0 0 20px 0;">Puffs Collected: 0</p>

            <div id="highScoreInput" style="display: none;">
                <p style="color: #FFB74D; font-weight: bold;">New Best!</p>
                <input type="text" id="playerName" placeholder="Enter Name" maxlength="10"
                    style="padding: 10px; border: 2px solid #AED581; border-radius: 10px; font-size: 1.2rem; text-align: center; width: 150px; background: #F1F8E9; color: #555;">
                <br><br>
                <button id="saveBtn"
                    style="background: #689F38; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-size: 1.2rem; cursor: pointer;">Save</button>
            </div>

            <div id="retryContainer" style="margin-top: 20px;">
                <div id="miniLeaderboard"
                    style="margin-bottom: 20px; font-size: 0.9rem; color: #555; text-align: left; display: inline-block;">
                </div>
                <br>
                <button id="retryBtn"
                    style="background: #DCEDC8; color: #33691E; border: none; padding: 10px 20px; border-radius: 20px; font-size: 1.2rem; cursor: pointer; font-weight: bold;">Try
                    Again</button>
            </div>
        </div>

        <div id="startMsg" style="color: #555; font-size: 1.5rem; margin-top: 200px; opacity: 0.7;">Move Mouse / Touch
            to Start</div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script type="module">
        import { SnakeEngine } from './js/core/SnakeEngine.js';

        window.onload = () => {
            const canvas = document.getElementById('gameCanvas');
            const game = new SnakeEngine(canvas);

            // UI Bindings
            game.onGameOver = (score, isHighscore, leaderboard) => {
                const panel = document.getElementById('gameOverPanel');
                const scoreText = document.getElementById('finalScore');
                const inputDiv = document.getElementById('highScoreInput');
                const retryContainer = document.getElementById('retryContainer');
                const lbDiv = document.getElementById('miniLeaderboard');

                panel.style.display = 'block';
                scoreText.innerText = `Puffs Collected: ${score}`;

                if (leaderboard && leaderboard.length > 0) {
                    lbDiv.innerHTML = '<b>Top Herders:</b><br>' +
                        leaderboard.slice(0, 3).map((e, i) => `${i + 1}. ${e.name} - ${e.score}`).join('<br>');
                } else {
                    lbDiv.innerHTML = '';
                }

                if (isHighscore) {
                    inputDiv.style.display = 'block';
                    retryContainer.style.display = 'none';
                    setTimeout(() => document.getElementById('playerName').focus(), 100);
                } else {
                    inputDiv.style.display = 'none';
                    retryContainer.style.display = 'block';
                }
            };

            game.onStart = () => {
                document.getElementById('startMsg').style.display = 'none';
            };

            document.getElementById('saveBtn').onclick = () => {
                const name = document.getElementById('playerName').value || "Herder";
                game.saveHighscore(name);
                document.getElementById('highScoreInput').style.display = 'none';
                document.getElementById('retryContainer').style.display = 'block';
            };

            document.getElementById('retryBtn').onclick = () => {
                document.getElementById('gameOverPanel').style.display = 'none';
                game.reset();
                game.start();
            };

            game.start();

            // Skin Selector
            document.getElementById('skinBtn').onclick = () => {
                game.nextSkin();
                const skinName = game.skins[game.currentSkin].name;
                document.getElementById('skinBtn').innerText = `🎨 ${skinName}`;
            };

            // Initialize skin button text
            setTimeout(() => {
                const skinName = game.skins[game.currentSkin].name;
                document.getElementById('skinBtn').innerText = `🎨 ${skinName}`;
            }, 100);
        };
    </script>
</body>

</html>
