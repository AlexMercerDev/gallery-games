<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Puff Jump</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #score-display {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 50px;
            font-weight: 900;
            font-style: italic;
            text-shadow: 2px 2px 0 #4CAF50, 4px 4px 0 #000;
            color: #FFF;
            transform: skew(-10deg);
            font-family: 'Arial Black', sans-serif;
        }

        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 5px solid #4CAF50;
            pointer-events: auto;
            min-width: 320px;
            color: #222;
            box-shadow: 0 10px 0 rgba(0, 0, 0, 0.2);
        }

        button {
            background: #4CAF50;
            border: none;
            padding: 15px 40px;
            color: #FFF;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            font-style: italic;
            transform: skew(-10deg);
            transition: transform 0.1s;
            box-shadow: 4px 4px 0 #2E7D32;
            border-radius: 5px;
        }

        button:hover {
            transform: skew(-10deg) scale(1.05);
        }

        button:active {
            transform: skew(-10deg) scale(0.95);
            box-shadow: 1px 1px 0 #2E7D32;
        }

        #hint {
            position: absolute;
            bottom: 80px;
            width: 100%;
            text-align: center;
            font-size: 28px;
            font-weight: 900;
            color: #4FC3F7;
            animation: pulse 1s infinite alternate;
            font-style: italic;
            text-shadow: 2px 2px 0px #FFF, 4px 4px 0px #0288D1;
        }

        @keyframes pulse {
            opacity: 0.3;
        }
    </style>
</head>

<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <!-- Skin Selector -->
        <button id="skinBtn"
            style="position: absolute; top: 20px; left: 20px; pointer-events: auto; background: rgba(255,255,255,0.9); border: 3px solid #4CAF50; border-radius: 15px; padding: 10px 15px; font-size: 16px; cursor: pointer; font-weight: bold; color: #2E7D32; transform: skew(-10deg); box-shadow: 3px 3px 0 #2E7D32;">
            🎨 Skin
        </button>

        <div id="score-display">0m</div>
        <div id="hint">TAP TO JUMP</div>

        <div id="game-over">
            <h1 style="margin: 0 0 10px 0; font-size: 60px; font-style: italic; text-transform: uppercase;">CRASHED</h1>
            <div id="final-score" style="font-size: 32px; margin-bottom: 20px;">Distance: 0m</div>
            <button onclick="engine.restart()">Run Again</button>
            <br><br>
            <button onclick="location.href='../../index.html'"
                style="background: #333; color: #FFF; font-size: 16px;">Exit</button>
        </div>
    </div>

    <script type="module">
        import { JumpEngine } from './js/core/JumpEngine.js';

        const canvas = document.getElementById('gameCanvas');
        const engine = new JumpEngine(canvas);

        window.engine = engine;
        engine.start();

        // Skin Selector
        document.getElementById('skinBtn').onclick = () => {
            engine.nextSkin();
            const skinName = engine.skins[engine.currentSkin].name;
            document.getElementById('skinBtn').innerText = `🎨 ${skinName}`;
        };

        // Initialize skin button text
        setTimeout(() => {
            const skinName = engine.skins[engine.currentSkin].name;
            document.getElementById('skinBtn').innerText = `🎨 ${skinName}`;
        }, 100);
    </script>
</body>

</html>
