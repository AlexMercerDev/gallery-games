<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Puff Merge</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #FDF6E3;
            touch-action: none;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>
    <div id="ui-layer"
        style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center;">

        <!-- Skin Selector (Top Right) -->
        <button id="skinBtn"
            style="position: absolute; top: 10px; right: 10px; pointer-events: auto; background: rgba(255,255,255,0.9); border: 2px solid #D3C6AA; border-radius: 15px; padding: 8px 15px; font-size: 14px; cursor: pointer; font-weight: bold; color: #6B5B5B;">
            🎨 Skin
        </button>

        <!-- Game Over / High Score Form -->
        <div id="gameOverPanel"
            style="display: none; background: rgba(255, 255, 255, 0.95); padding: 2rem; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); pointer-events: auto; border: 2px solid #D3C6AA;">
            <h1 style="color: #FF9AA2; margin: 0 0 10px 0; font-size: 2.5rem;">Game Over!</h1>
            <p id="finalScore" style="font-size: 1.5rem; color: #8E7F7F; margin: 0 0 20px 0;">Score: 0</p>

            <div id="highScoreInput" style="display: none;">
                <p style="color: #FFB7B2; font-weight: bold;">New Highscore!</p>
                <input type="text" id="playerName" placeholder="Enter Name" maxlength="10"
                    style="padding: 10px; border: 2px solid #D3C6AA; border-radius: 10px; font-size: 1.2rem; text-align: center; width: 150px; background: #FDF6E3; color: #6B5B5B;">
                <br><br>
                <button id="saveBtn"
                    style="background: #FF9AA2; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-size: 1.2rem; cursor: pointer;">Save</button>
            </div>

            <div id="retryContainer" style="margin-top: 20px;">
                <button id="retryBtn"
                    style="background: #AECBFA; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-size: 1.2rem; cursor: pointer;">Try
                    Again</button>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script type="module">
        import { PuffEngine } from './js/core/PuffEngine.js';

        window.onload = () => {
            const canvas = document.getElementById('gameCanvas');
            const game = new PuffEngine(canvas);

            // UI Bindings
            game.onGameOver = (score, isHighscore) => {
                const panel = document.getElementById('gameOverPanel');
                const scoreText = document.getElementById('finalScore');
                const inputDiv = document.getElementById('highScoreInput');
                const retryContainer = document.getElementById('retryContainer');

                panel.style.display = 'block';
                scoreText.innerText = `Score: ${score}`;

                if (isHighscore) {
                    inputDiv.style.display = 'block';
                    retryContainer.style.display = 'none';
                    setTimeout(() => document.getElementById('playerName').focus(), 100);
                } else {
                    inputDiv.style.display = 'none';
                    retryContainer.style.display = 'block';
                }
            };

            document.getElementById('saveBtn').onclick = () => {
                const name = document.getElementById('playerName').value || "Anon";
                game.saveHighscore(name);
                
                // Sync with Gallery API if available (Remote Leaderboard)
                if (window.parent && window.parent.GalleryAPI) {
                    window.parent.GalleryAPI.submitScore(name, game.score);
                }

                document.getElementById('highScoreInput').style.display = 'none';
                document.getElementById('retryContainer').style.display = 'block';
            };

            document.getElementById('retryBtn').onclick = () => {
                document.getElementById('gameOverPanel').style.display = 'none';
                game.reset();
                game.start();
            };

            game.start();

            // Skin Selector
            document.getElementById('skinBtn').onclick = () => {
                game.nextSkin();
                const skinName = game.skins[game.currentSkin].name;
                document.getElementById('skinBtn').innerText = `🎨 ${skinName}`;
            };

            // Initialize skin button text
            setTimeout(() => {
                const skinName = game.skins[game.currentSkin].name;
                document.getElementById('skinBtn').innerText = `🎨 ${skinName}`;
            }, 100);
        };
    </script>
</body>

</html>
