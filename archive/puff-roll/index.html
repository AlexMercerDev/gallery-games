<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Puff Roll</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 30px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
        }

        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #00FFFF;
            pointer-events: auto;
        }

        button {
            background: linear-gradient(45deg, #00FFFF, #FF00FF);
            border: none;
            padding: 15px 40px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #00FFFF;
        }

        #controls-hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 18px;
            opacity: 0.7;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
        }

        /* Mobile Joystick */
        #joystick-zone {
            display: none;
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            touch-action: none;
            pointer-events: auto;
        }

        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: rgba(0, 255, 255, 0.5);
            border-radius: 50%;
            box-shadow: 0 0 10px #00FFFF;
            pointer-events: none;
        }

        @media (hover: none) and (pointer: coarse) {
            #controls-hint {
                display: none;
            }

            #joystick-zone {
                display: block;
            }
        }
    </style>
    <!-- Import Map for Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>

<body>
    <div id="ui-layer">
        <div id="score">0</div>
        <div id="controls-hint">Use WASD or Arrows to Roll</div>

        <div id="joystick-zone">
            <div id="joystick-knob"></div>
        </div>

        <div id="game-over">
            <h1 style="font-size: 48px; margin: 0 0 20px 0; color: #FF00FF;">FALLEN!</h1>
            <div id="final-score" style="font-size: 24px; margin-bottom: 20px;">Score: 0</div>
            <button onclick="location.reload()">Retry</button>
            <button onclick="location.href='../../index.html'"
                style="background: #444; margin-left: 10px;">Exit</button>
        </div>
    </div>

    <script type="module">
        import { RollEngine } from './js/core/RollEngine.js';

        const engine = new RollEngine();
        engine.start();

        // Expose for UI
        window.engine = engine;

        // Joystick Logic
        const zone = document.getElementById('joystick-zone');
        const knob = document.getElementById('joystick-knob');
        let dragging = false;
        let startX, startY;
        const maxDist = 70;

        zone.addEventListener('touchstart', (e) => {
            dragging = true;
            const touch = e.touches[0];
            const rect = zone.getBoundingClientRect();
            // Center is rect.width/2
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            // Set initial relative? No, joystick usually centers on press or fixed center.
            // Fixed center logic:
            updateKnob(touch.clientX, touch.clientY);
        });

        zone.addEventListener('touchmove', (e) => {
            if (!dragging) return;
            e.preventDefault();
            updateKnob(e.touches[0].clientX, e.touches[0].clientY);
        });

        zone.addEventListener('touchend', () => {
            dragging = false;
            knob.style.transform = `translate(-50%, -50%)`;
            engine.setJoystick(0, 0);
        });

        function updateKnob(clientX, clientY) {
            const rect = zone.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            let dx = clientX - centerX;
            let dy = clientY - centerY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist > maxDist) {
                dx = (dx / dist) * maxDist;
                dy = (dy / dist) * maxDist;
            }

            knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;

            // Normalize -1 to 1
            engine.setJoystick(dx / maxDist, dy / maxDist);
        }
    </script>
</body>

</html>
