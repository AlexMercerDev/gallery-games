<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Puff Drill</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #222;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #hud-top {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 15px;
            border-radius: 10px;
            border: 2px solid #555;
            box-shadow: 0 4px 0 #333;
        }

        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 4px solid #FF8800;
            pointer-events: auto;
        }

        button {
            background: linear-gradient(to bottom, #FFCC00, #FF8800);
            border: none;
            padding: 15px 40px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            text-shadow: 1px 1px 0 #AA5500;
            box-shadow: 0 6px 0 #AA5500;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #AA5500;
        }

        /* Mobile Controls */
        #controls-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            pointer-events: none;
            display: none;
        }

        @media (hover: none) and (pointer: coarse) {
            #controls-layer {
                display: flex;
                flex-wrap: wrap;
            }

            #controls-hint {
                display: none;
            }
        }

        .dpad-btn {
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            pointer-events: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            user-select: none;
            color: white;
            backdrop-filter: blur(4px);
        }

        .dpad-btn:active {
            background: rgba(255, 200, 0, 0.3);
            border-color: #FFCC00;
        }

        #btn-left {
            bottom: 20px;
            left: 20px;
            width: 80px;
            height: 80px;
        }

        #btn-right {
            bottom: 20px;
            left: 120px;
            width: 80px;
            height: 80px;
        }

        #btn-down {
            bottom: 20px;
            right: 20px;
            width: 100px;
            height: 100px;
            font-size: 50px;
            background: rgba(255, 100, 0, 0.2);
        }

        #controls-hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 18px;
            opacity: 0.8;
            font-weight: bold;
            color: #FFCC00;
        }
    </style>
</head>

<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="hud-top">
            <div class="stat-box" id="depth-display">Depth: 0m</div>
            <div class="stat-box" style="color: #00FFFF;" id="air-display">Air: 100%</div>
            <div class="stat-box" style="color: #FFCC00;" id="score-display">0</div>
        </div>

        <div id="controls-hint">Arrows or Tap Zones to Drill (Left/Right/Center)</div>

        <div id="controls-layer">
            <div id="btn-left" class="dpad-btn">←</div>
            <div id="btn-right" class="dpad-btn">→</div>
            <div id="btn-down" class="dpad-btn">↓</div>
        </div>

        <div id="game-over">
            <h1 id="go-title" style="font-size: 48px; margin: 0 0 20px 0; color: #FF3333;">OUT OF AIR</h1>
            <div id="final-score" style="font-size: 32px; margin-bottom: 20px; color: #FFCC00;">Score: 0</div>
            <div id="final-depth" style="font-size: 20px; margin-bottom: 20px;">Depth: 0m</div>
            <button onclick="engine.restart()">Drill Again</button>
            <button onclick="location.href='../../index.html'"
                style="background: #444; margin-left: 10px; box-shadow: 0 6px 0 #222;">Exit</button>
        </div>
    </div>

    <script type="module">
        import { DrillEngine } from './js/core/DrillEngine.js';

        const canvas = document.getElementById('gameCanvas');
        const engine = new DrillEngine(canvas);

        // Expose for UI
        window.engine = engine;
        engine.start();
    </script>
</body>

</html>
