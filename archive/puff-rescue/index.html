<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Puff Rescue</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1025;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #hud-top {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 15px;
            border-radius: 10px;
            border: 1px solid #555;
        }

        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #00FF00;
            pointer-events: auto;
        }

        button {
            background: linear-gradient(45deg, #00FF00, #008800);
            border: none;
            padding: 15px 40px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #00FF00;
        }

        /* Mobile Controls */
        #controls-layer {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            height: 120px;
            pointer-events: none;
            display: none;
            /* Hidden on desktop by default, logic can toggle */
        }

        .touch-btn {
            position: absolute;
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            user-select: none;
            color: rgba(255, 255, 255, 0.7);
        }

        .touch-btn:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0.95);
        }

        #btn-left {
            bottom: 20px;
            left: 20px;
        }

        #btn-right {
            bottom: 20px;
            left: 120px;
        }

        #btn-thrust {
            bottom: 20px;
            right: 40px;
            width: 100px;
            height: 100px;
            border-color: #00FFFF;
        }

        @media (hover: none) and (pointer: coarse) {
            #controls-hint {
                display: none;
            }

            #controls-layer {
                display: block;
            }
        }

        /* Mobile Controls Hints */
        #controls-hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 16px;
            opacity: 0.6;
        }
    </style>
</head>

<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="hud-top">
            <div class="stat-box" id="score-display">Level: 1</div>
            <div class="stat-box" style="color: #00FFFF;" id="fuel-display">Fuel: 100%</div>
            <div class="stat-box" id="alt-display">Alt: 0</div>
        </div>

        <div id="controls-hint">Tap Left/Right to Rotate • Hold Space to Thrust</div>

        <div id="controls-layer">
            <div id="btn-left" class="touch-btn">↺</div>
            <div id="btn-right" class="touch-btn">↻</div>
            <div id="btn-thrust" class="touch-btn">🚀</div>
        </div>

        <div id="game-over">
            <h1 id="go-title" style="font-size: 48px; margin: 0 0 20px 0; color: #FF3333;">CRASHED</h1>
            <div id="go-message" style="font-size: 20px; margin-bottom: 20px;">Too fast!</div>
            <div id="final-score" style="font-size: 24px; margin-bottom: 20px;">Score: 0</div>
            <button onclick="engine.restart()">Retry</button>
            <button onclick="location.href='../../index.html'"
                style="background: #444; margin-left: 10px;">Exit</button>
        </div>
    </div>

    <script type="module">
        import { RescueEngine } from './js/core/RescueEngine.js';

        const canvas = document.getElementById('gameCanvas');
        const engine = new RescueEngine(canvas);

        // Expose for UI
        window.engine = engine;
        engine.start();
    </script>
</body>

</html>
