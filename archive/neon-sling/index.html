<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Sling</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            touch-action: none;
            /* Prevent browser scrolling on mobile */
        }

        canvas {
            display: block;
            margin: 0 auto;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            /* Placeholder font */
            color: white;
        }

        .ui-element {
            pointer-events: auto;
        }
    </style>
</head>

<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <!-- UI elements will be injected here or managed by a UI system -->
        <h1 id="loading-text">LOADING...</h1>
    </div>

    <!-- Game Scripts -->
    <!-- Using native ES modules -->
    <script type="module">
        import { GameEngine } from './js/core/GameEngine.js';

        window.onload = () => {
            const canvas = document.getElementById('gameCanvas');
            const game = new GameEngine(canvas);

            // Remove loading text
            document.getElementById('loading-text').style.display = 'none';

            game.start();
        };
    </script>
</body>

</html>
