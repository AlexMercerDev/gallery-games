<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Games</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Iframe overlay */
        #game-frame-container {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #FDF6E3;
            z-index: 1000;
        }
        #game-frame {
            width: 100%; height: 100%; border: none;
        }
        #close-game {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.1); border: none;
            width: 40px; height: 40px; border-radius: 20px;
            cursor: pointer; font-size: 20px; color: #6B5B5B;
            display: flex; align-items: center; justify-content: center;
            z-index: 1001;
        }
        #close-game:hover { background: rgba(0,0,0,0.2); }
    </style>
</head>

<body>
    <div id="game-frame-container">
        <button id="close-game">×</button>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <div class="gallery-container">
        <div class="title-card">
            <h3>Daily Featured Game</h3>
            <h1 id="game-title"
                style="background: linear-gradient(90deg, #fff, #aaa); -webkit-background-clip: text; background-clip: text; color: transparent;">
                Loading...</h1>
            <p id="game-desc">Games are changing every day.</p>
        </div>

        <button id="play-btn" class="play-button"
            style="background: #fff; color: #000; box-shadow: 0 0 15px rgba(255, 255, 255, 0.4); border: none; cursor: pointer;">PLAY NOW</button>

        <div id="rating-container" style="margin-top: 2rem; text-align: center;">
            <!-- Stars injected here -->
        </div>

        <div id="leaderboard-container"
            style="margin-top: 2rem; text-align: center; background: rgba(255,255,255,0.8); padding: 1rem; border-radius: 10px; max-width: 300px; margin-left: auto; margin-right: auto; backdrop-filter: blur(5px);">
            <!-- Leaderboard injected here -->
        </div>

        <footer style="position: absolute; bottom: 20px; opacity: 0.5; font-size: 0.8rem;">
            Gallery Games Prototype v0.3
        </footer>
    </div>

    <script type="module">
        import { GalleryManager } from './assets/js/GalleryManager.js';

        window.onload = () => {
            const gallery = new GalleryManager();
            window.GalleryAPI = gallery; // Expose to Iframe
            gallery.init();

            document.getElementById('play-btn').onclick = () => {
                const url = gallery.currentGame.path;
                document.getElementById('game-frame').src = url;
                document.getElementById('game-frame-container').style.display = 'block';
            };

            document.getElementById('close-game').onclick = () => {
                document.getElementById('game-frame-container').style.display = 'none';
                document.getElementById('game-frame').src = '';
                gallery.renderLeaderboard(); // Refresh after play
            };
        };
    </script>
</body>

</html>
